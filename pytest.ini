[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = .
addopts =
    --strict-markers
    --strict-config
    --disable-warnings
    --cov=custom_components.oauth_mail
    --cov-report=term-missing
filterwarnings =
    ignore::DeprecationWarning